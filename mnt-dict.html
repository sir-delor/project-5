<!doctype html>
<html lang="ru">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">


  <link rel="stylesheet" href="styles/global.css">
  <link rel="stylesheet" href="styles/style.css">

    <link rel="icon" href="img/favicon.svg" type="image/svg+xml">
  <link rel="icon" href="favicon.ico" type="image/x-icon">
  <link rel="icon" href="img/code-dict.ico">

  <link rel="apple-touch-icon" href="/img/code-dict-180.png"> <!-- apple -->


    <title>Обновление каталога карточек терминов</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            line-height: 1.6;
            color: #333;
            max-width: 800px;
            margin: 0 auto;
            padding: 20px;
            background-color: #f5f5f5;
        }

        h1 {
            text-align: center;
            color: #2c3e50;
            margin-bottom: 30px;
        }

        .container {
            background: white;
            padding: 30px;
            border-radius: 10px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .status {
            padding: 15px;
            margin-bottom: 20px;
            border-radius: 8px;
            text-align: center;
            font-weight: bold;
        }

        .loading {
            background-color: #fff8e1;
            color: #e67e22;
            border: 2px dashed #ffc107;
        }

        .success {
            background-color: #e8f5e8;
            color: #2ecc71;
            border: 2px solid #2ecc71;
        }

        .error {
            background-color: #ffeaea;
            color: #e74c3c;
            border: 2px solid #e74c3c;
        }

        .button-group {
            display: flex;
            gap: 15px;
            justify-content: center;
            flex-wrap: wrap;
            margin: 20px 0;
        }

        button {
            padding: 12px 24px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 16px;
            font-weight: 600;
            transition: all 0.3s;
        }

        #checkBtn {
            background-color: #3498db;
            color: white;
        }

        #updateBtn {
            background-color: #27ae60;
            color: white;
        }

        #downloadBtn {
            background-color: #9b59b6;
            color: white;
        }

        button:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        button:disabled {
            background-color: #bdc3c7;
            cursor: not-allowed;
            transform: none;
        }

        .hidden {
            display: none;
        }

        pre {
            background: #f8f9fa;
            padding: 15px;
            border-radius: 5px;
            overflow: auto;
        }
    </style>
</head>
<body>
    <h1>Управление каталогом карточек терминов</h1>

    <div class="container">
        <div class="status" id="status">
            Нажмите кнопку «Проверить обновления» для анализа каталога карточек.
        </div>

        <div id="cardCount" style="margin-top: 10px; font-weight: bold;">
            В библиотеке: загружаем...
        </div>

        <div class="button-group">
            <button id="checkBtn">Проверить обновления</button>
            <button id="updateBtn" disabled>Обновить библиотеку</button>
            <button id="downloadBtn" disabled>Скачать список</button>
        </div>

        <div id="newFiles" class="hidden">
            <h3>Новые карточки:</h3>
            <pre id="newFilesPreview"></pre>
        </div>

        <div id="fileList" class="hidden">
            <h3>Текущий список файлов:</h3>
            <pre id="listPreview"></pre>
        </div>
    </div>


    <script src="update-list-cards.js"></script>
</body>
</html>
